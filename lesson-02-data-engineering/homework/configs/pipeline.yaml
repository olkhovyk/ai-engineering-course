# Pipeline configuration

input_dir: "samples"
output_dir: "data/processed"
versions_dir: "data/versions"

# Parser settings (unstructured)
parsers:
  pdf:
    strategy: "auto"       # auto | fast | ocr_only | hi_res
    ocr_language: "eng"

# Chunking (langchain text splitters)
chunking:
  strategy: "fixed_size"  # fixed_size | sentence | paragraph
  chunk_size: 512         # characters
  chunk_overlap: 50       # overlap between chunks

# Streaming settings
streaming:
  watch_mode: false
  batch_size: 5
  batch_timeout_sec: 10
  max_queue_size: 100

# Versioning
versioning:
  enabled: true
  keep_versions: 10

# Resilience
resilience:
  enabled: false
  max_file_size_mb: 100.0
  max_retries: 2
